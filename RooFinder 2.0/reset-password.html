<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RootFinder - Restablecer contraseña</title>
  <meta name="theme-color" content="#020408" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300ffe0'/%3E%3Cstop offset='100%25' stop-color='%237c3aed'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='url(%23g)'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-family='Arial, sans-serif' font-size='30' font-weight='700' fill='%23020408'%3E%CE%A3%3C/text%3E%3C/svg%3E" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300ffe0'/%3E%3Cstop offset='100%25' stop-color='%237c3aed'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='url(%23g)'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-family='Arial, sans-serif' font-size='30' font-weight='700' fill='%23020408'%3E%CE%A3%3C/text%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-void: #020408;
      --bg-panel: rgba(8, 13, 22, 0.92);
      --bg-input: rgba(255,255,255,0.035);
      --bg-input-focus: rgba(255,255,255,0.065);
      --acid: #00ffe0;
      --violet: #7c3aed;
      --ember: #ff4d4d;
      --text-prime: #eef2ff;
      --text-sub: #8892a4;
      --border-base: rgba(255,255,255,0.08);
      --border-acid: rgba(0,255,224,0.3);
      --font-display: 'Syne', sans-serif;
      --font-body: 'Space Grotesk', sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(0,255,224,0.14), transparent 32%),
        radial-gradient(circle at bottom right, rgba(124,58,237,0.14), transparent 28%),
        var(--bg-void);
      color: var(--text-prime);
      font-family: var(--font-body);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(520px, 100%);
      background: linear-gradient(180deg, rgba(8,13,22,0.96), rgba(5,9,15,0.98));
      border: 1px solid var(--border-base);
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.45);
    }
    h1 {
      margin: 0 0 12px;
      font-family: var(--font-display);
    }
    .field {
      width: 100%;
      margin: 10px 0 16px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--border-base);
      background: var(--bg-input);
      color: var(--text-prime);
      font: inherit;
    }
    .btn {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--acid), var(--violet));
      color: #000;
      font-weight: 700;
      cursor: pointer;
    }
    .msg {
      margin-top: 14px;
      color: var(--text-sub);
      font-size: 14px;
    }
    .link {
      color: var(--acid);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Restablecer contraseña</h1>
    <p>Escribe tu nueva contrasena para actualizar tu cuenta.</p>
    <input id="newPassword" class="field" type="password" placeholder="Nueva contraseña" />
    <input id="confirmPassword" class="field" type="password" placeholder="Confirmar contraseña" />
    <button class="btn" id="resetBtn">Actualizar contraseña</button>
    <div class="msg" id="message"></div>
    <p class="msg"><a class="link" href="/">Volver al inicio</a></p>
  </main>

  <script>
    const API_BASE =
      window.location.protocol === 'file:' ||
      window.location.hostname === 'localhost' ||
      window.location.hostname === '127.0.0.1'
        ? 'http://localhost:4000'
        : window.location.origin;
    const token = new URLSearchParams(window.location.search).get('token');
    const message = document.getElementById('message');

    if (!token) {
      message.textContent = 'Falta el token de recuperacion.';
      document.getElementById('resetBtn').disabled = true;
    }

    document.getElementById('resetBtn').addEventListener('click', async () => {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!newPassword || newPassword.length < 8) {
        message.textContent = 'La contrasena debe tener al menos 8 caracteres.';
        return;
      }
      if (newPassword !== confirmPassword) {
        message.textContent = 'Las contrasenas no coinciden.';
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/api/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });
        const data = await response.json();

        if (!response.ok) {
          message.textContent = data.message || 'No se pudo actualizar la contrasena.';
          return;
        }

        message.textContent = data.message || 'Contrasena actualizada. Ya puedes iniciar sesion.';
      } catch (err) {
        message.textContent = 'No se pudo conectar con el servidor.';
      }
    });
  </script>
</body>
</html>
