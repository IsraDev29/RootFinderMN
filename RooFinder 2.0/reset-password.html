<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RootFinder - Restablecer contraseña</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #020408;
      color: #eef2ff;
      font-family: 'Space Grotesk', sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(520px, 100%);
      background: rgba(10, 16, 27, 0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.45);
    }
    h1 {
      margin: 0 0 12px;
      font-family: 'Syne', sans-serif;
    }
    .field {
      width: 100%;
      margin: 10px 0 16px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
      color: #eef2ff;
      font: inherit;
    }
    .btn {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #00ffe0, #7c3aed);
      color: #000;
      font-weight: 700;
      cursor: pointer;
    }
    .msg {
      margin-top: 14px;
      color: #8892a4;
      font-size: 14px;
    }
    .link {
      color: #00ffe0;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Restablecer contraseña</h1>
    <p>Escribe tu nueva contrasena para actualizar tu cuenta.</p>
    <input id="newPassword" class="field" type="password" placeholder="Nueva contraseña" />
    <input id="confirmPassword" class="field" type="password" placeholder="Confirmar contraseña" />
    <button class="btn" id="resetBtn">Actualizar contraseña</button>
    <div class="msg" id="message"></div>
    <p class="msg"><a class="link" href="/">Volver al inicio</a></p>
  </main>

  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    const message = document.getElementById('message');

    if (!token) {
      message.textContent = 'Falta el token de recuperacion.';
      document.getElementById('resetBtn').disabled = true;
    }

    document.getElementById('resetBtn').addEventListener('click', async () => {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!newPassword || newPassword.length < 8) {
        message.textContent = 'La contrasena debe tener al menos 8 caracteres.';
        return;
      }
      if (newPassword !== confirmPassword) {
        message.textContent = 'Las contrasenas no coinciden.';
        return;
      }

      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });
        const data = await response.json();

        if (!response.ok) {
          message.textContent = data.message || 'No se pudo actualizar la contrasena.';
          return;
        }

        message.textContent = data.message || 'Contrasena actualizada. Ya puedes iniciar sesion.';
      } catch (err) {
        message.textContent = 'No se pudo conectar con el servidor.';
      }
    });
  </script>
</body>
</html>
